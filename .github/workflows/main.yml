name : Run Postman Collection workflow
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: 30 02 * * *
    - cron: 00 14 * * *

jobs:
  run-postman-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: checkout the code
        uses: 	actions/checkout@v6.0.2
        
      - name : Install node
        uses : actions/setup-node@v6.4.0
        with : 
          node-version: '24'
      - name : Install newman and html-extra globally
        run : |
              npm install -g newman
              npm install -g newman-reporter-htmlextra
      - name : Run the postman collection with newman
        run  : |
               newman run 'Inwarranty-flow Collection.postman_collection.json' \
               -e QA.postman_environment.json \
               -d testData.csv \
               -r cli,htmlextra \
               --reporter-htmlextra-export ./newman/index.html


      - name : Newman Report
        if : always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name : Newman
          path : newman/*.html

      - name : Creating Git hub pages branch
        if : always()
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: newman/

      - name : Send email notification
        if : always()
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD}}
          subject: API Test report
          to: yogita.daurby@gmail.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body : | 
                    Hi ,the report has beed uploaded and url 
                    is: https://yogitadaurby-sys.github.io/Phoenix-In-warranty-Flow-Collection/
          
      
      
